<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alyosha Latyntsev - Marginalia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('pic1.jpeg');
            background-size: 100% auto;
            background-color: white;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: rgba(255, 255, 255, 0.5);
            color: black;
            text-align: left;
            padding: 2em 4em;
        }    
        main {
            margin: 0 5%;
            margin-bottom: 2em;
        }
        .purple-box {
            background-color: rgba(255, 255, 255, 0.5);
            color: black;
            margin-top: 4em;
            padding: 0.5em 1em;
        }
        ul {
            padding-left: 1.5em;
        }
        .big { font-size: 20pt; }
        .medium { font-size: 15pt; }
    </style>
</head>

<body>
    <header>
        <div style="text-align: center;">
            <h1>Marginalia</h1>
            <br> A secret page to share things with friends.
        </div>
    </header>

    <main>

        <div class="purple-box">
            <h3>Index</h3>
            <ul id="page-list"></ul>
        </div>


        <div class="purple-box">
            <h3>Index</h3>
            aaaaaaaaa
        </div>





    </main>







    <script>
    fetch('pages.txt')
        .then(r => r.text())
        .then(text => {
            const list = document.getElementById('page-list');
            text.trim().split(/\r?\n/).forEach(line => {
                const match = line.match(/^\s*\{(.+),\s*(https?:\/\/[^}]+)\}\s*$/);
                if (match) {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = match[2].trim();
                    a.textContent = match[1].trim();
                    li.appendChild(a);
                    list.appendChild(li);
                }
            });
        });
    </script>
</body>
</html>
