<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikZ String Diagram Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #FAF8F5;
            --panel-bg: #FFFFFF;
            --border-color: #E8E4DF;
            --text-primary: #2D2A26;
            --text-secondary: #6B6660;
            --accent: #7C9885;
            --accent-hover: #6B8874;
            --grid-color: #D4CFC8;
            --selection-glow: rgba(124, 152, 133, 0.4);
            --white-line: #FFFFFF;
            --black-line: #2D2A26;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
            margin: 0 8px;
        }

        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--panel-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--bg-color);
            border-color: var(--text-secondary);
        }

        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn.active:hover {
            background: var(--accent-hover);
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-control {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .grid-control input, .property-select {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 5px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-primary);
            width: 58px;
        }

        .grid-control input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .property-select {
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            width: auto;
        }

        .property-select.wide {
            min-width: 70px;
        }

        .shape-buttons {
            display: flex;
            gap: 4px;
        }

        .shape-btn {
            width: 26px;
            height: 26px;
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .shape-btn:hover {
            border-color: var(--text-secondary);
        }

        .shape-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .shape-btn svg {
            stroke: var(--text-primary);
            fill: none;
            stroke-width: 1.5;
        }

        .shape-btn.active svg {
            stroke: white;
        }

        /* Toggle buttons for mode indicator */
        .mode-toggles {
            position: absolute;
            top: 20px;
            left: 140px;
            display: none;
            gap: 6px;
            pointer-events: auto;
        }

        .mode-toggles.visible {
            display: flex;
        }

        .toggle-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--panel-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .toggle-btn:hover {
            background: var(--bg-color);
            border-color: var(--text-secondary);
        }

        .toggle-btn.active {
            background: #6B8874;
            border-color: #6B8874;
        }

        .toggle-btn svg {
            stroke: var(--text-primary);
            fill: none;
            stroke-width: 1.5;
        }

        .toggle-btn.active svg {
            stroke: white;
        }

        /* Inline text editor overlay */
        .inline-editor {
            position: absolute;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 4px 8px;
            border: 2px solid var(--accent);
            border-radius: 4px;
            background: white;
            color: var(--text-primary);
            text-align: center;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            transform: translate(-50%, -50%);
        }

        /* Main layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Canvas wrapper - contains canvas and property bar */
        .canvas-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Canvas container */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-color);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Scale indicator */
        .scale-indicator {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .scale-bar {
            height: 2px;
            background: var(--text-secondary);
            border-radius: 1px;
        }

        /* Mode indicator */
        .mode-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 6px 12px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .mode-indicator.add-mode {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Pending point indicator */
        .pending-indicator {
            position: absolute;
            top: 20px;
            left: 140px;
            padding: 6px 12px;
            background: #E8F0EA;
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            pointer-events: none;
            display: none;
        }

        .pending-indicator.visible {
            display: block;
        }

        /* Property bar at bottom */
        .property-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            min-height: 52px;
            flex-wrap: wrap;
        }

        .property-bar.hidden {
            display: none;
        }

        .property-bar-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            padding-right: 8px;
            border-right: 1px solid var(--border-color);
        }

        .property-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .property-group-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .property-input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 5px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-primary);
            width: 55px;
        }

        .property-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .property-input.narrow {
            width: 58px;
        }

        .property-input.text-input {
            width: 120px;
        }

        .coord-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .delete-btn {
            padding: 6px 12px;
            background: #F5E6E6;
            border: 1px solid #E8D4D4;
            color: #8B5A5A;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s ease;
            margin-left: auto;
        }

        .delete-btn:hover {
            background: #EED9D9;
            border-color: #D4C0C0;
        }

        /* Code panel */
        .code-panel {
            width: 360px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
        }

        .code-panel.collapsed {
            width: 40px;
        }

        .code-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .code-panel-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .code-panel.collapsed .code-panel-header h3,
        .code-panel.collapsed .copy-btn {
            display: none;
        }

        .code-panel.collapsed .code-panel-header {
            justify-content: center;
            padding: 12px 8px;
        }

        .code-content {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }

        .code-panel.collapsed .code-content {
            display: none;
        }

        #tikz-output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            width: 100%;
            min-height: 350px;
            resize: vertical;
        }

        .library-notice {
            margin-top: 12px;
            padding: 10px 12px;
            background: #FFF8E6;
            border: 1px solid #E8DCC0;
            border-radius: 6px;
            font-size: 12px;
            color: #6B5A3A;
            display: none;
        }

        .library-notice.visible {
            display: block;
        }

        .library-notice-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: #5A4A2A;
        }

        .library-notice code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.05);
            padding: 2px 5px;
            border-radius: 3px;
        }

        .copy-btn {
            font-size: 12px;
            padding: 6px 10px;
        }

        /* Keyboard hints */
        .keyboard-hint {
            font-size: 10px;
            padding: 2px 5px;
            background: var(--bg-color);
            border-radius: 3px;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        .btn.active .keyboard-hint {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .delete-btn .keyboard-hint {
            background: rgba(139, 90, 90, 0.15);
            color: #8B5A5A;
        }

        /* LaTeX warning */
        .latex-warning {
            font-style: italic;
            font-size: 11px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s ease, color 3s ease;
            color: #C44;
        }

        .latex-warning.visible {
            opacity: 1;
        }

        .latex-warning.fading {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-group">
            <button id="select-mode-btn" class="btn active">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                </svg>
                Select
                <span class="keyboard-hint">S</span>
            </button>
            <button id="add-mode-btn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Line
                <span class="keyboard-hint">A</span>
            </button>
            <button id="text-mode-btn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4 7 4 4 20 4 20 7"/>
                    <line x1="9" y1="20" x2="15" y2="20"/>
                    <line x1="12" y1="4" x2="12" y2="20"/>
                </svg>
                Text
                <span class="keyboard-hint">T</span>
            </button>
            <button id="node-mode-btn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="8"/>
                </svg>
                Node
                <span class="keyboard-hint">N</span>
            </button>
            <button id="region-mode-btn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12,2 22,8 22,16 12,22 2,16 2,8"/>
                </svg>
                Region
                <span class="keyboard-hint">R</span>
            </button>
            <button id="circle-mode-btn" class="btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                </svg>
                Circle
                <span class="keyboard-hint">O</span>
            </button>
        </div>

        <div class="toolbar-divider"></div>

        <div class="toolbar-group">
            <button id="undo-btn" class="btn btn-icon" title="Undo (Z)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 7v6h6"/>
                    <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6.36 2.64L3 13"/>
                </svg>
            </button>
            <button id="redo-btn" class="btn btn-icon" title="Redo (Y)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 7v6h-6"/>
                    <path d="M3 17a9 9 0 019-9 9 9 0 016.36 2.64L21 13"/>
                </svg>
            </button>
        </div>

        <div class="toolbar-divider"></div>

        <div class="grid-control">
            <span>Grid:</span>
            <input type="number" id="grid-size" value="0.5" step="0.125" min="0.0625">
        </div>
    </div>

    <div class="main-container">
        <div class="canvas-wrapper">
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
                <div class="mode-indicator" id="mode-indicator">Select Mode</div>
                <div class="mode-toggles" id="mode-toggles">
                    <button id="thickness-toggle" class="toggle-btn" title="Line thickness (0.8pt / 1.6pt)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="4" y1="12" x2="20" y2="12" stroke-width="2"/>
                        </svg>
                    </button>
                    <button id="white-toggle" class="toggle-btn" title="White backing (0pt / 6pt)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="4" y1="12" x2="20" y2="12" stroke-width="1.5"/>
                        </svg>
                    </button>
                </div>
                <div class="pending-indicator" id="pending-indicator">Click to place end point</div>
                <div class="scale-indicator">
                    <div class="scale-bar" id="scale-bar"></div>
                    <span id="scale-label">1 unit</span>
                </div>
            </div>

            <!-- Property bar at bottom - content changes based on selection -->
            <div class="property-bar hidden" id="property-bar"></div>
        </div>

        <div class="code-panel" id="code-panel">
            <div class="code-panel-header">
                <h3>TikZ Output</h3>
                <button class="btn copy-btn" id="copy-btn" title="Copy (C)">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                    </svg>
                    Copy
                    <span class="keyboard-hint">C</span>
                </button>
            </div>
            <div class="code-content">
                <textarea id="tikz-output" readonly></textarea>
                <div class="library-notice" id="library-notice">
                    <div class="library-notice-title">Required TikZ Libraries</div>
                    <div id="library-list"></div>
                </div>
                <div class="latex-warning" id="latex-warning">LaTeX equations won't render here, but don't worry — they will in the tikzpicture!</div>
            </div>
        </div>
    </div>

    <script>
        // ============== STATE ==============
        const state = {
            lines: [],
            textNodes: [],
            shapeNodes: [],
            regions: [],
            circles: [],

            // Selection - track type and id
            selection: null, // { type: 'line'|'text'|'shape'|'region'|'circle', id: number }

            mode: 'select', // 'select', 'add', 'text', 'node', 'region', 'circle'

            // Canvas transform
            panX: 0,
            panY: 0,
            zoom: 50,

            // Grid
            gridSize: 0.5,

            // Default line settings
            defaultLineWidth: 0.8, // 0.8 or 1.6
            defaultWhiteWidth: 0, // 0 or 6

            // Default region settings
            defaultRegionLineWidth: 0.8,
            defaultRegionPattern: 'north west lines',
            defaultRegionPatternColor: 'black!30',

            // Default circle settings
            defaultCircleLineWidth: 2,
            defaultCircleColor: 'black',

            // Interaction state
            isDragging: false,
            dragType: null,
            dragItemId: null,
            dragPointIndex: null,
            dragHandleType: null,
            dragStartScreen: { x: 0, y: 0 },
            dragStartWorld: { x: 0, y: 0 },
            newLineStart: null,
            pendingLineStart: null,
            previewEnd: null,
            pendingRegionPoints: [],
            previewRegionEnd: null,

            // Undo/redo
            undoStack: [],
            redoStack: [],

            // ID counters
            nextLineId: 1,
            nextTextId: 1,
            nextShapeId: 1,
            nextRegionId: 1,
            nextCircleId: 1
        };

        // ============== DOM ELEMENTS ==============
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.querySelector('.canvas-container');
        const modeIndicator = document.getElementById('mode-indicator');
        const modeToggles = document.getElementById('mode-toggles');
        const pendingIndicator = document.getElementById('pending-indicator');
        const scaleBar = document.getElementById('scale-bar');
        const scaleLabel = document.getElementById('scale-label');
        const propertyBar = document.getElementById('property-bar');
        const tikzOutput = document.getElementById('tikz-output');
        const latexWarning = document.getElementById('latex-warning');

        // ============== LATEX WARNING ==============
        let latexWarningTimeout = null;
        let latexWarningFadeTimeout = null;

        function showLatexWarning() {
            // Clear any existing timeouts
            if (latexWarningTimeout) clearTimeout(latexWarningTimeout);
            if (latexWarningFadeTimeout) clearTimeout(latexWarningFadeTimeout);

            // Reset to red and show
            latexWarning.classList.remove('fading');
            latexWarning.classList.add('visible');

            // After 2 seconds, start fading to black
            latexWarningFadeTimeout = setTimeout(() => {
                latexWarning.classList.add('fading');
            }, 2000);
        }

        function checkForLatex(text) {
            // Check for $ or \ followed by common LaTeX commands
            if (text.includes('$') || /\\[a-zA-Z]/.test(text)) {
                showLatexWarning();
            }
        }

        // ============== HELPERS ==============
        function screenToWorld(screenX, screenY) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = screenX - rect.left;
            const canvasY = screenY - rect.top;
            const worldX = (canvasX - state.panX) / state.zoom;
            const worldY = -(canvasY - state.panY) / state.zoom;
            return { x: worldX, y: worldY };
        }

        function worldToScreen(worldX, worldY) {
            const screenX = worldX * state.zoom + state.panX;
            const screenY = -worldY * state.zoom + state.panY;
            return { x: screenX, y: screenY };
        }

        function snapToGrid(value) {
            return Math.round(value / state.gridSize) * state.gridSize;
        }

        function computeStraightLineAngles(startX, startY, endX, endY) {
            const dx = endX - startX;
            const dy = endY - startY;
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            return { outAngle: angle, inAngle: (angle + 180) % 360 };
        }

        function getMaxOrdering() {
            if (state.lines.length === 0) return 0;
            return Math.max(...state.lines.map(l => l.ordering));
        }

        function createLine(startX, startY, endX, endY) {
            const angles = computeStraightLineAngles(startX, startY, endX, endY);
            return {
                id: state.nextLineId++,
                startX: snapToGrid(startX),
                startY: snapToGrid(startY),
                endX: snapToGrid(endX),
                endY: snapToGrid(endY),
                outAngle: angles.outAngle,
                inAngle: angles.inAngle,
                lineWidth: state.defaultLineWidth,
                whiteWidth: state.defaultWhiteWidth,
                ordering: Math.floor(getMaxOrdering()) + 1,
                arrowStyle: 'none',  // 'none' or 'arrow'
                lineStyle: 'straight'  // 'straight' or 'squiggly'
            };
        }

        function createTextNode(x, y) {
            return {
                id: state.nextTextId++,
                x: snapToGrid(x),
                y: snapToGrid(y),
                text: 'text',
                position: 'none', // 'none', 'above', 'below', 'left', 'right'
                fontSize: 12
            };
        }

        function createShapeNode(x, y) {
            return {
                id: state.nextShapeId++,
                x: snapToGrid(x),
                y: snapToGrid(y),
                text: 'node',
                shape: 'circle', // 'circle', 'rectangle', 'ellipse'
                outlineWidth: 0.8,
                paddingX: 4,
                paddingY: 3,
                fontSize: 12
            };
        }

        function getMaxRegionOrdering() {
            if (state.regions.length === 0) return 0;
            return Math.max(...state.regions.map(r => r.ordering));
        }

        function createRegion(points) {
            // Compute angles for each point based on neighboring points
            const regionPoints = points.map((p, i) => {
                const prev = points[(i - 1 + points.length) % points.length];
                const next = points[(i + 1) % points.length];
                // outAngle: angle from this point toward next point
                const outAngle = Math.atan2(next.y - p.y, next.x - p.x) * 180 / Math.PI;
                // inAngle: angle from this point toward previous point
                const inAngle = Math.atan2(prev.y - p.y, prev.x - p.x) * 180 / Math.PI;
                return {
                    x: snapToGrid(p.x),
                    y: snapToGrid(p.y),
                    outAngle: outAngle,
                    inAngle: inAngle
                };
            });
            return {
                id: state.nextRegionId++,
                points: regionPoints,
                lineWidth: state.defaultRegionLineWidth,
                pattern: state.defaultRegionPattern,
                patternColor: state.defaultRegionPatternColor,
                ordering: Math.floor(getMaxRegionOrdering()) + 1
            };
        }

        function createCircle(x, y) {
            return {
                id: state.nextCircleId++,
                x: snapToGrid(x),
                y: snapToGrid(y),
                lineWidth: state.defaultCircleLineWidth,
                color: state.defaultCircleColor
            };
        }

        // ============== UNDO/REDO ==============
        function saveState() {
            state.undoStack.push(JSON.stringify({
                lines: state.lines,
                textNodes: state.textNodes,
                shapeNodes: state.shapeNodes,
                regions: state.regions,
                circles: state.circles
            }));
            state.redoStack = [];
            if (state.undoStack.length > 100) state.undoStack.shift();
        }

        function undo() {
            if (state.undoStack.length === 0) return;
            state.redoStack.push(JSON.stringify({
                lines: state.lines,
                textNodes: state.textNodes,
                shapeNodes: state.shapeNodes,
                regions: state.regions,
                circles: state.circles
            }));
            const saved = JSON.parse(state.undoStack.pop());
            state.lines = saved.lines;
            state.textNodes = saved.textNodes;
            state.shapeNodes = saved.shapeNodes;
            state.regions = saved.regions || [];
            state.circles = saved.circles || [];
            state.selection = null;
            updatePropertyBar();
            render();
            updateTikzOutput();
        }

        function redo() {
            if (state.redoStack.length === 0) return;
            state.undoStack.push(JSON.stringify({
                lines: state.lines,
                textNodes: state.textNodes,
                shapeNodes: state.shapeNodes,
                regions: state.regions,
                circles: state.circles
            }));
            const saved = JSON.parse(state.redoStack.pop());
            state.lines = saved.lines;
            state.textNodes = saved.textNodes;
            state.shapeNodes = saved.shapeNodes;
            state.regions = saved.regions || [];
            state.circles = saved.circles || [];
            state.selection = null;
            updatePropertyBar();
            render();
            updateTikzOutput();
        }

        // ============== RENDERING ==============
        function resizeCanvas() {
            const rect = canvasContainer.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            if (state.panX === 0 && state.panY === 0) {
                state.panX = rect.width / 2;
                state.panY = rect.height / 2;
            }
            render();
        }

        function drawGrid() {
            const rect = canvasContainer.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;
            ctx.fillStyle = '#D4CFC8';
            const topLeft = screenToWorld(0, 0);
            const bottomRight = screenToWorld(width, height);
            const startX = Math.floor(topLeft.x / state.gridSize) * state.gridSize;
            const endX = Math.ceil(bottomRight.x / state.gridSize) * state.gridSize;
            const startY = Math.floor(bottomRight.y / state.gridSize) * state.gridSize;
            const endY = Math.ceil(topLeft.y / state.gridSize) * state.gridSize;
            const dotSize = Math.max(1, state.zoom / 50);
            for (let x = startX; x <= endX; x += state.gridSize) {
                for (let y = startY; y <= endY; y += state.gridSize) {
                    const screen = worldToScreen(x, y);
                    ctx.beginPath();
                    ctx.arc(screen.x, screen.y, dotSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            // Origin marker
            const origin = worldToScreen(0, 0);
            ctx.strokeStyle = '#B0A99F';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(origin.x + 20, origin.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(origin.x, origin.y);
            ctx.lineTo(origin.x, origin.y - 20);
            ctx.stroke();
            ctx.fillStyle = '#8B8580';
            ctx.beginPath();
            ctx.arc(origin.x, origin.y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function computeBezierControlPoints(line) {
            const startScreen = worldToScreen(line.startX, line.startY);
            const endScreen = worldToScreen(line.endX, line.endY);
            const dx = endScreen.x - startScreen.x;
            const dy = endScreen.y - startScreen.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const looseness = dist / 3;
            const outRad = line.outAngle * Math.PI / 180;
            const cp1x = startScreen.x + Math.cos(outRad) * looseness;
            const cp1y = startScreen.y - Math.sin(outRad) * looseness;
            const inRad = line.inAngle * Math.PI / 180;
            const cp2x = endScreen.x + Math.cos(inRad) * looseness;
            const cp2y = endScreen.y - Math.sin(inRad) * looseness;
            return {
                start: startScreen,
                end: endScreen,
                cp1: { x: cp1x, y: cp1y },
                cp2: { x: cp2x, y: cp2y }
            };
        }

        // Helper to sample bezier curve points
        function sampleBezier(points, numSamples) {
            const samples = [];
            for (let i = 0; i <= numSamples; i++) {
                const t = i / numSamples;
                const x = Math.pow(1-t, 3) * points.start.x + 3 * Math.pow(1-t, 2) * t * points.cp1.x +
                          3 * (1-t) * Math.pow(t, 2) * points.cp2.x + Math.pow(t, 3) * points.end.x;
                const y = Math.pow(1-t, 3) * points.start.y + 3 * Math.pow(1-t, 2) * t * points.cp1.y +
                          3 * (1-t) * Math.pow(t, 2) * points.cp2.y + Math.pow(t, 3) * points.end.y;
                samples.push({x, y});
            }
            return samples;
        }

        // Draw a squiggly path along sampled points
        function drawSquigglyPath(samples, amplitude) {
            if (samples.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(samples[0].x, samples[0].y);
            for (let i = 1; i < samples.length; i++) {
                const prev = samples[i-1];
                const curr = samples[i];
                const dx = curr.x - prev.x;
                const dy = curr.y - prev.y;
                const len = Math.sqrt(dx*dx + dy*dy);
                if (len === 0) continue;
                // Perpendicular direction
                const px = -dy / len;
                const py = dx / len;
                // Alternate offset
                const offset = (i % 2 === 0 ? 1 : -1) * amplitude;
                const midX = (prev.x + curr.x) / 2 + px * offset;
                const midY = (prev.y + curr.y) / 2 + py * offset;
                ctx.quadraticCurveTo(midX, midY, curr.x, curr.y);
            }
            ctx.stroke();
        }

        function drawLine(line, isSelected) {
            const points = computeBezierControlPoints(line);
            const lineStyle = line.lineStyle || 'straight';
            const isDashed = lineStyle === 'dashed';
            const isSquiggly = lineStyle === 'squiggly';

            // Set line dash for dashed style
            if (isDashed) {
                ctx.setLineDash([8 * state.zoom / 50, 4 * state.zoom / 50]);
            } else {
                ctx.setLineDash([]);
            }

            if (line.whiteWidth > 0) {
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = line.whiteWidth * state.zoom / 50;
                ctx.lineCap = 'round';
                if (isSquiggly) {
                    const samples = sampleBezier(points, 40);
                    drawSquigglyPath(samples, 3 * state.zoom / 50);
                } else {
                    ctx.beginPath();
                    ctx.moveTo(points.start.x, points.start.y);
                    ctx.bezierCurveTo(points.cp1.x, points.cp1.y, points.cp2.x, points.cp2.y, points.end.x, points.end.y);
                    ctx.stroke();
                }
            }
            ctx.strokeStyle = '#2D2A26';
            ctx.lineWidth = line.lineWidth * state.zoom / 50;
            ctx.lineCap = 'round';
            if (isSquiggly) {
                const samples = sampleBezier(points, 40);
                drawSquigglyPath(samples, 3 * state.zoom / 50);
            } else {
                ctx.beginPath();
                ctx.moveTo(points.start.x, points.start.y);
                ctx.bezierCurveTo(points.cp1.x, points.cp1.y, points.cp2.x, points.cp2.y, points.end.x, points.end.y);
                ctx.stroke();
            }

            // Reset line dash
            ctx.setLineDash([]);

            // Draw arrowhead if arrow style
            if (line.arrowStyle === 'arrow') {
                // Get tangent direction at end of curve by sampling near the end
                const t = 0.98;
                const t1 = 1.0;
                const x0 = Math.pow(1-t, 3) * points.start.x + 3 * Math.pow(1-t, 2) * t * points.cp1.x +
                          3 * (1-t) * Math.pow(t, 2) * points.cp2.x + Math.pow(t, 3) * points.end.x;
                const y0 = Math.pow(1-t, 3) * points.start.y + 3 * Math.pow(1-t, 2) * t * points.cp1.y +
                          3 * (1-t) * Math.pow(t, 2) * points.cp2.y + Math.pow(t, 3) * points.end.y;
                const x1 = points.end.x;
                const y1 = points.end.y;
                const arrowAngle = Math.atan2(y1 - y0, x1 - x0);
                const arrowLength = 10 * state.zoom / 50;
                ctx.fillStyle = '#2D2A26';
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(
                    x1 - arrowLength * Math.cos(arrowAngle - 0.4),
                    y1 - arrowLength * Math.sin(arrowAngle - 0.4)
                );
                ctx.lineTo(
                    x1 - arrowLength * Math.cos(arrowAngle + 0.4),
                    y1 - arrowLength * Math.sin(arrowAngle + 0.4)
                );
                ctx.closePath();
                ctx.fill();
            }

            if (isSelected) {
                ctx.strokeStyle = 'rgba(124, 152, 133, 0.5)';
                ctx.lineWidth = (line.lineWidth + 4) * state.zoom / 50;
                ctx.beginPath();
                ctx.moveTo(points.start.x, points.start.y);
                ctx.bezierCurveTo(points.cp1.x, points.cp1.y, points.cp2.x, points.cp2.y, points.end.x, points.end.y);
                ctx.stroke();
                ctx.strokeStyle = '#2D2A26';
                ctx.lineWidth = line.lineWidth * state.zoom / 50;
                ctx.beginPath();
                ctx.moveTo(points.start.x, points.start.y);
                ctx.bezierCurveTo(points.cp1.x, points.cp1.y, points.cp2.x, points.cp2.y, points.end.x, points.end.y);
                ctx.stroke();

                const handleRadius = 6;
                ctx.fillStyle = '#7C9885';
                ctx.beginPath();
                ctx.arc(points.start.x, points.start.y, handleRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(points.end.x, points.end.y, handleRadius, 0, Math.PI * 2);
                ctx.fill();

                const tangentLength = 75;
                const outRad = line.outAngle * Math.PI / 180;
                const outHandleX = points.start.x + Math.cos(outRad) * tangentLength;
                const outHandleY = points.start.y - Math.sin(outRad) * tangentLength;
                ctx.strokeStyle = '#7C9885';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(points.start.x, points.start.y);
                ctx.lineTo(outHandleX, outHandleY);
                ctx.stroke();
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(outHandleX, outHandleY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                const inRad = line.inAngle * Math.PI / 180;
                const inHandleX = points.end.x + Math.cos(inRad) * tangentLength;
                const inHandleY = points.end.y - Math.sin(inRad) * tangentLength;
                ctx.strokeStyle = '#7C9885';
                ctx.beginPath();
                ctx.moveTo(points.end.x, points.end.y);
                ctx.lineTo(inHandleX, inHandleY);
                ctx.stroke();
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(inHandleX, inHandleY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawTextNode(node, isSelected) {
            const screen = worldToScreen(node.x, node.y);
            const fontSize = (node.fontSize || 12) * state.zoom / 50;
            ctx.font = `${fontSize}px 'DM Sans', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Calculate text position based on position property
            let textX = screen.x;
            let textY = screen.y;
            const offset = 12 * state.zoom / 50;
            if (node.position === 'above') textY -= offset;
            else if (node.position === 'below') textY += offset;
            else if (node.position === 'left') textX -= offset;
            else if (node.position === 'right') textX += offset;

            if (isSelected) {
                const metrics = ctx.measureText(node.text);
                const padding = 4;
                ctx.fillStyle = 'rgba(124, 152, 133, 0.2)';
                ctx.fillRect(
                    textX - metrics.width / 2 - padding,
                    textY - fontSize / 2 - padding,
                    metrics.width + padding * 2,
                    fontSize + padding * 2
                );
            }

            ctx.fillStyle = '#2D2A26';
            ctx.fillText(node.text, textX, textY);

            // Draw position marker at actual coordinates
            if (isSelected && node.position !== 'none') {
                ctx.fillStyle = '#7C9885';
                ctx.beginPath();
                ctx.arc(screen.x, screen.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawShapeNode(node, isSelected) {
            const screen = worldToScreen(node.x, node.y);
            const fontSize = (node.fontSize || 12) * state.zoom / 50;
            ctx.font = `${fontSize}px 'DM Sans', sans-serif`;
            const metrics = ctx.measureText(node.text);
            const textWidth = metrics.width;
            const textHeight = fontSize;

            const paddingX = node.paddingX * state.zoom / 50;
            const paddingY = node.paddingY * state.zoom / 50;

            // Shape nodes are always centered at their coordinates
            const textX = screen.x;
            const textY = screen.y;

            // Draw shape
            ctx.fillStyle = '#FFFFFF';
            ctx.strokeStyle = '#2D2A26';
            ctx.lineWidth = node.outlineWidth * state.zoom / 50;

            if (node.shape === 'circle') {
                const radius = Math.max(textWidth / 2, textHeight / 2) + paddingX;
                ctx.beginPath();
                ctx.arc(textX, textY, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            } else if (node.shape === 'rectangle') {
                const width = textWidth + paddingX * 2;
                const height = textHeight + paddingY * 2;
                ctx.beginPath();
                ctx.rect(textX - width / 2, textY - height / 2, width, height);
                ctx.fill();
                ctx.stroke();
            } else if (node.shape === 'ellipse') {
                const rx = textWidth / 2 + paddingX;
                const ry = textHeight / 2 + paddingY;
                ctx.beginPath();
                ctx.ellipse(textX, textY, rx, ry, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            // Draw selection highlight
            if (isSelected) {
                ctx.strokeStyle = 'rgba(124, 152, 133, 0.5)';
                ctx.lineWidth = (node.outlineWidth + 3) * state.zoom / 50;
                if (node.shape === 'circle') {
                    const radius = Math.max(textWidth / 2, textHeight / 2) + paddingX;
                    ctx.beginPath();
                    ctx.arc(textX, textY, radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (node.shape === 'rectangle') {
                    const width = textWidth + paddingX * 2;
                    const height = textHeight + paddingY * 2;
                    ctx.beginPath();
                    ctx.rect(textX - width / 2, textY - height / 2, width, height);
                    ctx.stroke();
                } else if (node.shape === 'ellipse') {
                    const rx = textWidth / 2 + paddingX;
                    const ry = textHeight / 2 + paddingY;
                    ctx.beginPath();
                    ctx.ellipse(textX, textY, rx, ry, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // Draw text
            ctx.fillStyle = '#2D2A26';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.text, textX, textY);
        }

        function drawCircle(circle, isSelected) {
            const screen = worldToScreen(circle.x, circle.y);
            const radius = 3 * state.zoom / 50; // Small fixed radius
            const lineWidth = circle.lineWidth * state.zoom / 50;

            // Parse color for display (convert TikZ color to CSS)
            let displayColor = '#2D2A26'; // default black
            if (circle.color === 'black') displayColor = '#2D2A26';
            else if (circle.color === 'white') displayColor = '#FFFFFF';
            else if (circle.color === 'red') displayColor = '#CC0000';
            else if (circle.color === 'blue') displayColor = '#0000CC';
            else if (circle.color === 'green') displayColor = '#00CC00';
            else if (circle.color.includes('!')) {
                // Handle color mixing like black!50
                displayColor = 'rgba(45, 42, 38, 0.5)';
            }

            // Draw selection highlight first (behind)
            if (isSelected) {
                ctx.fillStyle = 'rgba(124, 152, 133, 0.5)';
                ctx.beginPath();
                ctx.arc(screen.x, screen.y, radius + lineWidth / 2 + 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw filled circle
            ctx.fillStyle = displayColor;
            ctx.beginPath();
            ctx.arc(screen.x, screen.y, radius + lineWidth / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function createPattern(patternType) {
            const patternCanvas = document.createElement('canvas');
            const patternSize = 8;
            patternCanvas.width = patternSize;
            patternCanvas.height = patternSize;
            const pctx = patternCanvas.getContext('2d');
            pctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            pctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            pctx.lineWidth = 1;

            if (patternType === 'north west lines') {
                pctx.beginPath();
                pctx.moveTo(0, patternSize);
                pctx.lineTo(patternSize, 0);
                pctx.moveTo(-patternSize/2, patternSize/2);
                pctx.lineTo(patternSize/2, -patternSize/2);
                pctx.moveTo(patternSize/2, patternSize + patternSize/2);
                pctx.lineTo(patternSize + patternSize/2, patternSize/2);
                pctx.stroke();
            } else if (patternType === 'north east lines') {
                pctx.beginPath();
                pctx.moveTo(0, 0);
                pctx.lineTo(patternSize, patternSize);
                pctx.moveTo(-patternSize/2, patternSize/2);
                pctx.lineTo(patternSize/2, patternSize + patternSize/2);
                pctx.moveTo(patternSize/2, -patternSize/2);
                pctx.lineTo(patternSize + patternSize/2, patternSize/2);
                pctx.stroke();
            } else if (patternType === 'crosshatch') {
                pctx.beginPath();
                // NW lines
                pctx.moveTo(0, patternSize);
                pctx.lineTo(patternSize, 0);
                pctx.moveTo(-patternSize/2, patternSize/2);
                pctx.lineTo(patternSize/2, -patternSize/2);
                pctx.moveTo(patternSize/2, patternSize + patternSize/2);
                pctx.lineTo(patternSize + patternSize/2, patternSize/2);
                // NE lines
                pctx.moveTo(0, 0);
                pctx.lineTo(patternSize, patternSize);
                pctx.moveTo(-patternSize/2, patternSize/2);
                pctx.lineTo(patternSize/2, patternSize + patternSize/2);
                pctx.moveTo(patternSize/2, -patternSize/2);
                pctx.lineTo(patternSize + patternSize/2, patternSize/2);
                pctx.stroke();
            } else if (patternType === 'dots') {
                const dotRadius = 1;
                pctx.beginPath();
                pctx.arc(patternSize/2, patternSize/2, dotRadius, 0, Math.PI * 2);
                pctx.fill();
            } else {
                // Default to north west lines
                pctx.beginPath();
                pctx.moveTo(0, patternSize);
                pctx.lineTo(patternSize, 0);
                pctx.stroke();
            }

            return ctx.createPattern(patternCanvas, 'repeat');
        }

        function computeRegionBezierPoints(region, pointIndex) {
            const points = region.points;
            const p = points[pointIndex];
            const nextIndex = (pointIndex + 1) % points.length;
            const nextP = points[nextIndex];

            const startScreen = worldToScreen(p.x, p.y);
            const endScreen = worldToScreen(nextP.x, nextP.y);

            const dx = endScreen.x - startScreen.x;
            const dy = endScreen.y - startScreen.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const looseness = dist / 3;

            const outRad = p.outAngle * Math.PI / 180;
            const cp1x = startScreen.x + Math.cos(outRad) * looseness;
            const cp1y = startScreen.y - Math.sin(outRad) * looseness;

            const inRad = nextP.inAngle * Math.PI / 180;
            const cp2x = endScreen.x + Math.cos(inRad) * looseness;
            const cp2y = endScreen.y - Math.sin(inRad) * looseness;

            return {
                start: startScreen,
                end: endScreen,
                cp1: { x: cp1x, y: cp1y },
                cp2: { x: cp2x, y: cp2y }
            };
        }

        function drawRegion(region, isSelected) {
            if (region.points.length < 3) return;

            // Create the path for the region
            ctx.beginPath();
            const firstScreen = worldToScreen(region.points[0].x, region.points[0].y);
            ctx.moveTo(firstScreen.x, firstScreen.y);

            for (let i = 0; i < region.points.length; i++) {
                const bezier = computeRegionBezierPoints(region, i);
                ctx.bezierCurveTo(bezier.cp1.x, bezier.cp1.y, bezier.cp2.x, bezier.cp2.y, bezier.end.x, bezier.end.y);
            }
            ctx.closePath();

            // Fill with pattern based on region.pattern
            const pattern = createPattern(region.pattern || 'north west lines');
            ctx.fillStyle = pattern;
            ctx.fill();

            // Draw outline (only if lineWidth > 0)
            if (region.lineWidth > 0) {
                ctx.strokeStyle = '#2D2A26';
                ctx.lineWidth = region.lineWidth * state.zoom / 50;
                ctx.stroke();
            }

            // Draw selection handles
            if (isSelected) {
                // Draw selection highlight
                ctx.strokeStyle = 'rgba(124, 152, 133, 0.5)';
                ctx.lineWidth = (region.lineWidth + 4) * state.zoom / 50;
                ctx.beginPath();
                ctx.moveTo(firstScreen.x, firstScreen.y);
                for (let i = 0; i < region.points.length; i++) {
                    const bezier = computeRegionBezierPoints(region, i);
                    ctx.bezierCurveTo(bezier.cp1.x, bezier.cp1.y, bezier.cp2.x, bezier.cp2.y, bezier.end.x, bezier.end.y);
                }
                ctx.closePath();
                ctx.stroke();

                // Redraw outline on top (only if lineWidth > 0)
                if (region.lineWidth > 0) {
                    ctx.strokeStyle = '#2D2A26';
                    ctx.lineWidth = region.lineWidth * state.zoom / 50;
                    ctx.beginPath();
                    ctx.moveTo(firstScreen.x, firstScreen.y);
                    for (let i = 0; i < region.points.length; i++) {
                        const bezier = computeRegionBezierPoints(region, i);
                        ctx.bezierCurveTo(bezier.cp1.x, bezier.cp1.y, bezier.cp2.x, bezier.cp2.y, bezier.end.x, bezier.end.y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                // Draw point handles and angle handles for each vertex
                const handleRadius = 6;
                const tangentLength = 75;

                for (let i = 0; i < region.points.length; i++) {
                    const p = region.points[i];
                    const screen = worldToScreen(p.x, p.y);

                    // Draw point handle
                    ctx.fillStyle = '#7C9885';
                    ctx.beginPath();
                    ctx.arc(screen.x, screen.y, handleRadius, 0, Math.PI * 2);
                    ctx.fill();

                    // Draw out angle handle
                    const outRad = p.outAngle * Math.PI / 180;
                    const outHandleX = screen.x + Math.cos(outRad) * tangentLength;
                    const outHandleY = screen.y - Math.sin(outRad) * tangentLength;
                    ctx.strokeStyle = '#7C9885';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(screen.x, screen.y);
                    ctx.lineTo(outHandleX, outHandleY);
                    ctx.stroke();
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(outHandleX, outHandleY, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Draw in angle handle
                    const inRad = p.inAngle * Math.PI / 180;
                    const inHandleX = screen.x + Math.cos(inRad) * tangentLength;
                    const inHandleY = screen.y - Math.sin(inRad) * tangentLength;
                    ctx.strokeStyle = '#7C9885';
                    ctx.beginPath();
                    ctx.moveTo(screen.x, screen.y);
                    ctx.lineTo(inHandleX, inHandleY);
                    ctx.stroke();
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(inHandleX, inHandleY, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            }
        }

        function drawPendingRegion() {
            if (state.pendingRegionPoints.length === 0) return;

            // Draw placed points
            for (let i = 0; i < state.pendingRegionPoints.length; i++) {
                const p = state.pendingRegionPoints[i];
                const screen = worldToScreen(p.x, p.y);

                ctx.fillStyle = '#7C9885';
                ctx.beginPath();
                ctx.arc(screen.x, screen.y, 6, 0, Math.PI * 2);
                ctx.fill();

                // Draw line to next point
                if (i < state.pendingRegionPoints.length - 1) {
                    const nextP = state.pendingRegionPoints[i + 1];
                    const nextScreen = worldToScreen(nextP.x, nextP.y);
                    ctx.strokeStyle = 'rgba(124, 152, 133, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(screen.x, screen.y);
                    ctx.lineTo(nextScreen.x, nextScreen.y);
                    ctx.stroke();
                }
            }

            // Draw preview line to cursor
            if (state.previewRegionEnd && state.pendingRegionPoints.length > 0) {
                const lastP = state.pendingRegionPoints[state.pendingRegionPoints.length - 1];
                const lastScreen = worldToScreen(lastP.x, lastP.y);
                const endScreen = worldToScreen(state.previewRegionEnd.x, state.previewRegionEnd.y);

                ctx.strokeStyle = 'rgba(124, 152, 133, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(lastScreen.x, lastScreen.y);
                ctx.lineTo(endScreen.x, endScreen.y);
                ctx.stroke();

                // Also draw closing line to first point if we have enough points
                if (state.pendingRegionPoints.length >= 2) {
                    const firstP = state.pendingRegionPoints[0];
                    const firstScreen = worldToScreen(firstP.x, firstP.y);
                    ctx.beginPath();
                    ctx.moveTo(endScreen.x, endScreen.y);
                    ctx.lineTo(firstScreen.x, firstScreen.y);
                    ctx.stroke();
                }

                ctx.setLineDash([]);
            }
        }

        function render() {
            const rect = canvasContainer.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            drawGrid();

            // Draw regions sorted by ordering (behind lines)
            const sortedRegions = [...state.regions].sort((a, b) => a.ordering - b.ordering);
            for (const region of sortedRegions) {
                const isSelected = state.selection?.type === 'region' && state.selection.id === region.id;
                if (!isSelected) drawRegion(region, false);
            }
            // Draw selected region on top of other regions
            if (state.selection?.type === 'region') {
                const region = state.regions.find(r => r.id === state.selection.id);
                if (region) drawRegion(region, true);
            }

            // Draw lines sorted by ordering
            const sortedLines = [...state.lines].sort((a, b) => a.ordering - b.ordering);
            for (const line of sortedLines) {
                const isSelected = state.selection?.type === 'line' && state.selection.id === line.id;
                if (!isSelected) drawLine(line, false);
            }
            // Draw selected line on top
            if (state.selection?.type === 'line') {
                const line = state.lines.find(l => l.id === state.selection.id);
                if (line) drawLine(line, true);
            }

            // Draw text nodes
            for (const node of state.textNodes) {
                const isSelected = state.selection?.type === 'text' && state.selection.id === node.id;
                drawTextNode(node, isSelected);
            }

            // Draw shape nodes
            for (const node of state.shapeNodes) {
                const isSelected = state.selection?.type === 'shape' && state.selection.id === node.id;
                drawShapeNode(node, isSelected);
            }

            // Draw circles
            for (const circle of state.circles) {
                const isSelected = state.selection?.type === 'circle' && state.selection.id === circle.id;
                drawCircle(circle, isSelected);
            }

            // Draw pending line start
            if (state.pendingLineStart) {
                const screen = worldToScreen(state.pendingLineStart.x, state.pendingLineStart.y);
                ctx.fillStyle = '#7C9885';
                ctx.beginPath();
                ctx.arc(screen.x, screen.y, 6, 0, Math.PI * 2);
                ctx.fill();
                if (state.previewEnd) {
                    const endScreen = worldToScreen(state.previewEnd.x, state.previewEnd.y);
                    ctx.strokeStyle = 'rgba(124, 152, 133, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(screen.x, screen.y);
                    ctx.lineTo(endScreen.x, endScreen.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            // Draw new line being dragged
            if (state.dragType === 'new-line' && state.newLineStart) {
                const tempLine = createLine(
                    state.newLineStart.x, state.newLineStart.y,
                    state.dragStartWorld.x, state.dragStartWorld.y
                );
                state.nextLineId--;
                drawLine(tempLine, false);
            }

            // Draw pending region points
            drawPendingRegion();

            updateScaleIndicator();
        }

        function updateScaleIndicator() {
            scaleBar.style.width = state.zoom + 'px';
            scaleLabel.textContent = '1 unit';
        }

        // ============== TIKZ OUTPUT ==============
        function updateTikzOutput() {
            let code = '\\begin{center}\n\\begin{tikzpicture}\n';

            // Regions (drawn first, behind everything)
            const sortedRegions = [...state.regions].sort((a, b) => a.ordering - b.ordering);
            for (const region of sortedRegions) {
                if (region.points.length < 3) continue;
                const options = [
                    `pattern=${region.pattern || 'north west lines'}`,
                    `pattern color=${region.patternColor}`,
                    `line width=${region.lineWidth.toFixed(1)}pt`
                ];
                let path = '';
                for (let i = 0; i < region.points.length; i++) {
                    const p = region.points[i];
                    const nextP = region.points[(i + 1) % region.points.length];
                    const px = p.x.toFixed(2);
                    const py = p.y.toFixed(2);
                    const outA = Math.round(p.outAngle);
                    const inA = Math.round(nextP.inAngle);
                    if (i === 0) {
                        path += `(${px},${py})`;
                    }
                    const nextX = nextP.x.toFixed(2);
                    const nextY = nextP.y.toFixed(2);
                    path += ` to[out=${outA}, in=${inA}] (${nextX},${nextY})`;
                }
                code += `\\filldraw[${options.join(', ')}]\n  ${path};\n`;
            }

            // Lines
            const sortedLines = [...state.lines].sort((a, b) => a.ordering - b.ordering);
            for (const line of sortedLines) {
                const sx = line.startX.toFixed(2);
                const sy = line.startY.toFixed(2);
                const ex = line.endX.toFixed(2);
                const ey = line.endY.toFixed(2);
                const outA = Math.round(line.outAngle);
                const inA = Math.round(line.inAngle);
                const arrowStyle = line.arrowStyle === 'arrow' ? '->' : '-';
                const lineStyle = line.lineStyle || 'straight';
                let styleOpts = '';
                if (lineStyle === 'squiggly') {
                    styleOpts = 'decorate, decoration={snake, amplitude=.4mm, segment length=2mm, post length=1mm}, ';
                } else if (lineStyle === 'dashed') {
                    styleOpts = 'dashed, ';
                }
                if (line.whiteWidth > 0) {
                    code += `\\draw[${styleOpts}${arrowStyle}, line width=${line.whiteWidth.toFixed(1)}pt, white] (${sx},${sy}) to[out=${outA}, in=${inA}] (${ex},${ey});\n`;
                }
                code += `\\draw[${styleOpts}${arrowStyle}, line width=${line.lineWidth.toFixed(1)}pt] (${sx},${sy}) to[out=${outA}, in=${inA}] (${ex},${ey});\n`;
            }

            // Text nodes
            for (const node of state.textNodes) {
                const x = node.x.toFixed(2);
                const y = node.y.toFixed(2);
                let options = [];
                if (node.position !== 'none') options.push(node.position);
                const fontSize = node.fontSize || 12;
                if (fontSize !== 12) options.push(`font=\\fontsize{${fontSize}pt}{${fontSize}pt}\\selectfont`);
                const optStr = options.length > 0 ? `[${options.join(', ')}]` : '';
                code += `\\node${optStr} at (${x},${y}) {${node.text}};\n`;
            }

            // Shape nodes
            for (const node of state.shapeNodes) {
                const x = node.x.toFixed(2);
                const y = node.y.toFixed(2);
                let options = [`draw`, `fill=white`, `line width=${node.outlineWidth.toFixed(1)}pt`];
                options.push(node.shape);
                if (node.shape === 'circle') {
                    options.push(`inner sep=${node.paddingX.toFixed(1)}pt`);
                } else {
                    options.push(`inner xsep=${node.paddingX.toFixed(1)}pt`);
                    options.push(`inner ysep=${node.paddingY.toFixed(1)}pt`);
                }
                const fontSize = node.fontSize || 12;
                if (fontSize !== 12) options.push(`font=\\fontsize{${fontSize}pt}{${fontSize}pt}\\selectfont`);
                code += `\\node[${options.join(', ')}] at (${x},${y}) {${node.text}};\n`;
            }

            // Circles
            for (const circle of state.circles) {
                const x = circle.x.toFixed(2);
                const y = circle.y.toFixed(2);
                const color = circle.color || 'black';
                const lineWidth = circle.lineWidth || 2;
                code += `\\fill[${color}] (${x},${y}) circle (${lineWidth.toFixed(1)}pt);\n`;
            }

            code += '\\end{tikzpicture}\n\\end{center}';
            tikzOutput.value = code;

            // Update library notice
            const hasSquiggly = state.lines.some(l => l.lineStyle === 'squiggly');
            const libraryNotice = document.getElementById('library-notice');
            const libraryList = document.getElementById('library-list');
            if (hasSquiggly) {
                libraryNotice.classList.add('visible');
                libraryList.innerHTML = 'Add to your preamble: <code>\\usetikzlibrary{decorations.pathmorphing}</code>';
            } else {
                libraryNotice.classList.remove('visible');
                libraryList.innerHTML = '';
            }
        }

        function copyTikzToClipboard() {
            navigator.clipboard.writeText(tikzOutput.value).then(() => {
                const btn = document.getElementById('copy-btn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
                setTimeout(() => btn.innerHTML = originalHTML, 1500);
            });
        }

        // ============== HIT TESTING ==============
        function hitTestLine(line, worldX, worldY) {
            const points = computeBezierControlPoints(line);
            const testScreen = worldToScreen(worldX, worldY);
            const samples = 50;
            const hitThreshold = 10;
            for (let i = 0; i <= samples; i++) {
                const t = i / samples;
                const x = Math.pow(1-t, 3) * points.start.x + 3 * Math.pow(1-t, 2) * t * points.cp1.x +
                          3 * (1-t) * Math.pow(t, 2) * points.cp2.x + Math.pow(t, 3) * points.end.x;
                const y = Math.pow(1-t, 3) * points.start.y + 3 * Math.pow(1-t, 2) * t * points.cp1.y +
                          3 * (1-t) * Math.pow(t, 2) * points.cp2.y + Math.pow(t, 3) * points.end.y;
                const dist = Math.sqrt(Math.pow(x - testScreen.x, 2) + Math.pow(y - testScreen.y, 2));
                if (dist < hitThreshold) return true;
            }
            return false;
        }

        function hitTestEndpoint(line, worldX, worldY) {
            const testScreen = worldToScreen(worldX, worldY);
            const startScreen = worldToScreen(line.startX, line.startY);
            const endScreen = worldToScreen(line.endX, line.endY);
            const threshold = 12;
            if (Math.sqrt(Math.pow(testScreen.x - startScreen.x, 2) + Math.pow(testScreen.y - startScreen.y, 2)) < threshold) return 'start';
            if (Math.sqrt(Math.pow(testScreen.x - endScreen.x, 2) + Math.pow(testScreen.y - endScreen.y, 2)) < threshold) return 'end';
            return null;
        }

        function hitTestHandle(line, worldX, worldY) {
            const testScreen = worldToScreen(worldX, worldY);
            const startScreen = worldToScreen(line.startX, line.startY);
            const endScreen = worldToScreen(line.endX, line.endY);
            const tangentLength = 75;
            const threshold = 12;
            const outRad = line.outAngle * Math.PI / 180;
            const outHandleX = startScreen.x + Math.cos(outRad) * tangentLength;
            const outHandleY = startScreen.y - Math.sin(outRad) * tangentLength;
            if (Math.sqrt(Math.pow(testScreen.x - outHandleX, 2) + Math.pow(testScreen.y - outHandleY, 2)) < threshold) return 'out';
            const inRad = line.inAngle * Math.PI / 180;
            const inHandleX = endScreen.x + Math.cos(inRad) * tangentLength;
            const inHandleY = endScreen.y - Math.sin(inRad) * tangentLength;
            if (Math.sqrt(Math.pow(testScreen.x - inHandleX, 2) + Math.pow(testScreen.y - inHandleY, 2)) < threshold) return 'in';
            return null;
        }

        function hitTestTextNode(node, worldX, worldY) {
            const screen = worldToScreen(node.x, node.y);
            const testScreen = worldToScreen(worldX, worldY);
            const fontSize = (node.fontSize || 12) * state.zoom / 50;
            ctx.font = `${fontSize}px 'DM Sans', sans-serif`;
            const metrics = ctx.measureText(node.text);
            const width = metrics.width + 32;
            const height = fontSize + 14;
            let textX = screen.x;
            let textY = screen.y;
            const offset = 12 * state.zoom / 50;
            if (node.position === 'above') textY -= offset;
            else if (node.position === 'below') textY += offset;
            else if (node.position === 'left') textX -= offset;
            else if (node.position === 'right') textX += offset;
            return Math.abs(testScreen.x - textX) < width / 2 && Math.abs(testScreen.y - textY) < height / 2;
        }

        function hitTestShapeNode(node, worldX, worldY) {
            const screen = worldToScreen(node.x, node.y);
            const testScreen = worldToScreen(worldX, worldY);
            const fontSize = (node.fontSize || 12) * state.zoom / 50;
            ctx.font = `${fontSize}px 'DM Sans', sans-serif`;
            const metrics = ctx.measureText(node.text);
            const paddingX = node.paddingX * state.zoom / 50;
            const paddingY = node.paddingY * state.zoom / 50;
            const textX = screen.x;
            const textY = screen.y;

            if (node.shape === 'circle') {
                const radius = Math.max(metrics.width / 2, fontSize / 2) + paddingX;
                return Math.sqrt(Math.pow(testScreen.x - textX, 2) + Math.pow(testScreen.y - textY, 2)) < radius;
            } else {
                const width = metrics.width + paddingX * 2;
                const height = fontSize + paddingY * 2;
                return Math.abs(testScreen.x - textX) < width / 2 && Math.abs(testScreen.y - textY) < height / 2;
            }
        }

        function hitTestCircle(circle, worldX, worldY) {
            const screen = worldToScreen(circle.x, circle.y);
            const testScreen = worldToScreen(worldX, worldY);
            const radius = 3 * state.zoom / 50;
            const lineWidth = circle.lineWidth * state.zoom / 50;
            const hitRadius = radius + lineWidth / 2 + 5; // Extra margin for easier clicking
            return Math.sqrt(Math.pow(testScreen.x - screen.x, 2) + Math.pow(testScreen.y - screen.y, 2)) < hitRadius;
        }

        function hitTestRegion(region, worldX, worldY) {
            if (region.points.length < 3) return false;
            const testScreen = worldToScreen(worldX, worldY);

            // Test if point is near any edge of the region (using bezier sampling)
            const hitThreshold = 10;
            for (let i = 0; i < region.points.length; i++) {
                const bezier = computeRegionBezierPoints(region, i);
                const samples = 30;
                for (let j = 0; j <= samples; j++) {
                    const t = j / samples;
                    const x = Math.pow(1-t, 3) * bezier.start.x + 3 * Math.pow(1-t, 2) * t * bezier.cp1.x +
                              3 * (1-t) * Math.pow(t, 2) * bezier.cp2.x + Math.pow(t, 3) * bezier.end.x;
                    const y = Math.pow(1-t, 3) * bezier.start.y + 3 * Math.pow(1-t, 2) * t * bezier.cp1.y +
                              3 * (1-t) * Math.pow(t, 2) * bezier.cp2.y + Math.pow(t, 3) * bezier.end.y;
                    const dist = Math.sqrt(Math.pow(x - testScreen.x, 2) + Math.pow(y - testScreen.y, 2));
                    if (dist < hitThreshold) return true;
                }
            }

            // Also test if point is inside the region using ray casting
            const screenPoints = region.points.map(p => worldToScreen(p.x, p.y));
            let inside = false;
            for (let i = 0, j = screenPoints.length - 1; i < screenPoints.length; j = i++) {
                const xi = screenPoints[i].x, yi = screenPoints[i].y;
                const xj = screenPoints[j].x, yj = screenPoints[j].y;
                if (((yi > testScreen.y) !== (yj > testScreen.y)) &&
                    (testScreen.x < (xj - xi) * (testScreen.y - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        function hitTestRegionPoint(region, worldX, worldY) {
            const testScreen = worldToScreen(worldX, worldY);
            const threshold = 12;
            for (let i = 0; i < region.points.length; i++) {
                const p = region.points[i];
                const pScreen = worldToScreen(p.x, p.y);
                if (Math.sqrt(Math.pow(testScreen.x - pScreen.x, 2) + Math.pow(testScreen.y - pScreen.y, 2)) < threshold) {
                    return i;
                }
            }
            return null;
        }

        function hitTestRegionHandle(region, worldX, worldY) {
            const testScreen = worldToScreen(worldX, worldY);
            const tangentLength = 75;
            const threshold = 12;

            for (let i = 0; i < region.points.length; i++) {
                const p = region.points[i];
                const pScreen = worldToScreen(p.x, p.y);

                // Check out handle
                const outRad = p.outAngle * Math.PI / 180;
                const outHandleX = pScreen.x + Math.cos(outRad) * tangentLength;
                const outHandleY = pScreen.y - Math.sin(outRad) * tangentLength;
                if (Math.sqrt(Math.pow(testScreen.x - outHandleX, 2) + Math.pow(testScreen.y - outHandleY, 2)) < threshold) {
                    return { pointIndex: i, handleType: 'out' };
                }

                // Check in handle
                const inRad = p.inAngle * Math.PI / 180;
                const inHandleX = pScreen.x + Math.cos(inRad) * tangentLength;
                const inHandleY = pScreen.y - Math.sin(inRad) * tangentLength;
                if (Math.sqrt(Math.pow(testScreen.x - inHandleX, 2) + Math.pow(testScreen.y - inHandleY, 2)) < threshold) {
                    return { pointIndex: i, handleType: 'in' };
                }
            }
            return null;
        }

        function findItemAtPoint(worldX, worldY) {
            // Check circles first (small, on top)
            for (let i = state.circles.length - 1; i >= 0; i--) {
                if (hitTestCircle(state.circles[i], worldX, worldY)) {
                    return { type: 'circle', id: state.circles[i].id };
                }
            }
            // Check shape nodes
            for (let i = state.shapeNodes.length - 1; i >= 0; i--) {
                if (hitTestShapeNode(state.shapeNodes[i], worldX, worldY)) {
                    return { type: 'shape', id: state.shapeNodes[i].id };
                }
            }
            // Check text nodes
            for (let i = state.textNodes.length - 1; i >= 0; i--) {
                if (hitTestTextNode(state.textNodes[i], worldX, worldY)) {
                    return { type: 'text', id: state.textNodes[i].id };
                }
            }
            // Check lines
            const sortedLines = [...state.lines].sort((a, b) => b.ordering - a.ordering);
            for (const line of sortedLines) {
                if (hitTestLine(line, worldX, worldY)) {
                    return { type: 'line', id: line.id };
                }
            }
            // Check regions
            const sortedRegions = [...state.regions].sort((a, b) => b.ordering - a.ordering);
            for (const region of sortedRegions) {
                if (hitTestRegion(region, worldX, worldY)) {
                    return { type: 'region', id: region.id };
                }
            }
            return null;
        }

            } else if (state.selection.type === 'text') {

                    </div>

            } else if (state.selection.type === 'shape') {
                const node = state.shapeNodes.find(n => n.id === state.selection.id);

                propertyBar.innerHTML = `
                    <span class="property-bar-label">Node #${node.id}</span>
                    <div class="property-group">
                        <span class="property-group-label">Pos</span>

                        <input type="number" class="property-input narrow" id="prop-x" value="${node.x}" step="${state.gridSize}">

                    </div>
                    ${node.shape !== 'circle' ? `<div class="property-group">
                        <span class="property-group-label">Pad Y</span>
                        <input type="number" class="property-input narrow" id="prop-padding-y" value="${node.paddingY}" step="0.5" min="0">

                    <div class="property-group">

                        <input type="text" class="property-input text-input" id="prop-text" value="${node.text}">

            } else if (state.selection.type === 'region') {

                propertyBar.innerHTML = `
                    <span class="property-bar-label">Region #${region.id}</span>

                            <option value="north east lines" ${region.pattern === 'north east lines' ? 'selected' : ''}>NE Lines</option>
                            <option value="crosshatch" ${region.pattern === 'crosshatch' ? 'selected' : ''}>Crosshatch</option>
                            <option value="dots" ${region.pattern === 'dots' ? 'selected' : ''}>Dots</option>
